{{- if and .Values.persistence.enabled (eq .Values.controller.type "Deployment") }}

apiVersion: v1
kind: PersistentVolumeClaim

metadata:
  name: {{ include "universal-app.fullname" . }}-pvc

spec:

  accessModes:
    - {{ .Values.persistence.accessMode }}

  storageClassName: {{ .Values.persistence.storageClassName }}

  resources:
    requests:
      storage: {{ .Values.persistence.size }}

{{- end }}